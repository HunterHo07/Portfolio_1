<svg xmlns="http://www.w3.org/2000/svg" width="720" height="720" viewBox="0 0 720 720" role="img" aria-labelledby="title desc">
  <title id="title">Intro to N8N Application and Basics by Hunter Ho for Krenovator</title>
  <desc id="desc">Krenovator poster for the free Intro to N8N Application and Basics class with Hunter Ho.</desc>
  <defs>
